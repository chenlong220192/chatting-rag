# ============================================================
# ChromaDB 配置
# ChromaDB 是向量数据库，负责存储文档片段的向量和原文，
# 支持通过向量相似度检索最相关的文档片段（Top-K）。
#
# service-url: ChromaDB HTTP 服务地址（K8s Ingress 或本地地址）
#   - 本地开发: http://localhost:8000
#   - K8s 环境: 通过 Ingress 暴露的内部服务地址
# ============================================================
chroma:
  service-url: http://chromadb.internal.local

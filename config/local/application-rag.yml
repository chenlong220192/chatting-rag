# ============================================================
# RAG（检索增强生成）配置
# RAG 流程：用户问题 → 向量化 → ChromaDB 检索相似片段 → 拼接为 Prompt → LLM 生成回答。
#
# top-k: 检索阶段返回的最相似片段数量（注意：实际返回数还会受 min-score 阈值过滤影响）
#   - 数值越大召回越多但噪声也越多，建议范围 3~10
#
# min-score: 相关度过滤阈值（0~1），低于此分数的检索结果将被丢弃
#   - 注意：这里使用的是余弦相似度（Cosine Similarity），不是 L2 距离
#   - 余弦相似度含义：
#     1.0   → 完全相同（夹角=0°）
#     0.9~1.0 → 非常相似（近义词、同一主题）
#     0.7~0.9 → 比较相似（相关话题）
#     0.5~0.7 → 弱相关（有一定关联但不够精准）
#     0.3~0.5 → 基本无关
#     0.0~0.3 → 几乎无关
#   - 阈值越低返回越多结果但噪声越多，越高越精准但可能遗漏
#   - 建议中文 RAG 场景设为 0.5~0.7，以平衡精准度和召回率
#
# chunk.size: 文档切片时每个片段的最大字符数
#   - 太小：语义不完整，检索粒度过细；太大：语义混杂，信息密度低
#   - 建议范围 200~800，中文建议 400~600
#
# chunk.overlap: 相邻片段之间的重叠字符数，用于避免在句子中间截断导致语义丢失
#   - 通常为 chunk.size 的 10%~20%
#   - 重叠越多存储成本越高，但检索完整性越好
# ============================================================
rag:
  top-k: 5
  min-score: 0.5
  chunk:
    size: 500
    overlap: 50
